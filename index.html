<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #f0f0f0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        #header { background: #333; color: white; width: 100%; padding: 15px 0; text-align: center; font-weight: bold; letter-spacing: 1px; }
        
        #court { 
            position: relative; width: 350px; height: 600px; background: white; 
            border: 4px solid #333; margin-top: 20px; border-radius: 5px; overflow: hidden;
        }

        /* Court Markings */
        .line { position: absolute; border: 2px solid #777; pointer-events: none; }
        .half-court { width: 100%; top: 50%; height: 0; }
        .center-circle { width: 70px; height: 70px; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        
        /* The Key */
        .key { width: 80px; height: 120px; left: 50%; transform: translateX(-50%); }
        .top-key { top: 0; border-top: none; }
        .bot-key { bottom: 0; border-bottom: none; }
        
        /* 3-Point Arc */
        .arc { 
            width: 280px; height: 200px; border: 2px solid #777; border-radius: 140px; 
            left: 50%; transform: translateX(-50%);
        }
        .top-arc { top: -80px; }
        .bot-arc { bottom: -80px; }

        /* Players & Ball */
        .piece { 
            position: absolute; width: 40px; height: 40px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; color: white; z-index: 10;
            touch-action: none; box-shadow: 0 4px 8px rgba(0,0,0,0.2); font-size: 20px;
        }
        .red { background: rgba(192, 57, 43, 0.85); border: 2px solid #c0392b; }
        .blue { background: rgba(41, 128, 185, 0.85); border: 2px solid #2980b9; }
        
        .ball { 
            width: 30px; height: 30px; background: #e67e22; border: 2px solid #d35400; 
            z-index: 11; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .ball::after { content: '🏀'; font-size: 18px; }

    </style>
</head>
<body>

<div id="header">BASKETBALL COACHBOARD</div>

<div id="court">
    <div class="line half-court"></div>
    <div class="line center-circle"></div>
    <div class="line key top-key"></div>
    <div class="line key bot-key"></div>
    <div class="line arc top-arc"></div>
    <div class="line arc bot-arc"></div>
    
    <div id="pieces-layer"></div>
</div>

<script>
    const layer = document.getElementById('pieces-layer');
    const court = document.getElementById('court');

    function createPiece(type, num, x, y) {
        const p = document.createElement('div');
        p.className = `piece ${type}`;
        if (type !== 'ball') p.innerText = num;
        
        p.style.left = x + 'px';
        p.style.top = y + 'px';
        
        p.onpointerdown = (e) => {
            p.setPointerCapture(e.pointerId);
            p.onpointermove = (ev) => {
                const rect = court.getBoundingClientRect();
                p.style.left = (ev.clientX - rect.left - (p.offsetWidth/2)) + 'px';
                p.style.top = (ev.clientY - rect.top - (p.offsetHeight/2)) + 'px';
            };
            p.onpointerup = () => { p.onpointermove = null; };
        };
        layer.appendChild(p);
    }

    function initGame() {
        layer.innerHTML = '';
        // Ball
        createPiece('ball', '', 160, 285);
        
        // Red Team (labeled 1-5)
        const redPos = [[155, 450], [60, 350], [250, 350], [90, 180], [220, 180]];
        for(let i=0; i<5; i++) {
            createPiece('red', i+1, redPos[i][0], redPos[i][1]);
        }

        // Blue Team (labeled 1-5)
        const bluePos = [[155, 110], [60, 80], [250, 80], [40, 230], [270, 230]];
        for(let i=0; i<5; i++) {
            createPiece('blue', i+1, bluePos[i][0], bluePos[i][1]);
        }
    }

    initGame();
</script>
</body>
</html>
